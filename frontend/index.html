<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Tickets IA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">
  <section class="hero">
    <span class="badge">Clasificador IA</span>
    <h1>Sistema de Tickets</h1>
    <p>
      Ingresa una solicitud de soporte y el modelo clasificará automáticamente
      el departamento correspondiente.
    </p>
  </section>

  <main class="card">
    <div class="ticket-header">
      <div>
        <p class="label-small">Ticket ID</p>
        <h2 id="ticketId"></h2>
      </div>
      <span class="status">Nuevo</span>
    </div>

    <div class="form-group">
      <label for="subject">Subject</label>
      <input type="text" id="subject" placeholder="Ej: Payment issue" />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Describe el problema del cliente..."></textarea>
    </div>

    <button onclick="sendTicket()" id="classifyBtn">
      Clasificar Ticket
    </button>

    <section id="result" class="result hidden">
      <div class="result-header">
        <p class="label-small">Categoría predicha</p>
        <h2 id="prediction"></h2>
      </div>

      <div class="confidence-box">
        <div class="confidence-title">
          <span>Confianza</span>
          <strong id="confidenceText">0%</strong>
        </div>

        <div class="bar">
          <div id="confidenceBar"></div>
        </div>
      </div>

      <h3>Probabilidades por clase</h3>
      <div id="probabilities" class="probabilities"></div>
    </section>
  </main>
</div>

<script src="script.js"></script>
</body>
</html>
